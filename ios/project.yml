name: Snoozy
options:
  bundleIdPrefix: com.snoozy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Snoozy:
    type: application
    platform: iOS
    sources:
      - path: Snoozy
    settings:
      base:
        INFOPLIST_FILE: Snoozy/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.snoozy.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
    info:
      path: Snoozy/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        CFBundleDisplayName: Snoozy
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
