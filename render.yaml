services:
  - type: web
    name: snoozy-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_CHAT_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_TTS_DEPLOYMENT
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: FISH_API_KEY
        sync: false
